<!-- ================= BLOOD REQUEST ================= -->

<section class="request">

    <div class="request-box">

        <h1>Blood Request Form</h1>

        <p>Fill in the details to request blood during an emergency.</p>

        <form>

            <div class="input-box">
                <label>Patient Name</label>
                <input type="text" placeholder="Enter Patient Name" required>
            </div>

            <div class="input-box">
                <label>Blood Group Required</label>

                <select required>
                    <option>Select Blood Group</option>
                    <option>A+</option>
                    <option>A-</option>
                    <option>B+</option>
                    <option>B-</option>
                    <option>AB+</option>
                    <option>AB-</option>
                    <option>O+</option>
                    <option>O-</option>
                </select>

            </div>

            <div class="input-box">
                <label>Hospital Name</label>
                <input type="text" placeholder="Enter Hospital Name" required>
            </div>

            <div class="input-box">
                <label>City</label>
                <input type="text" placeholder="Enter City" required>
            </div>

            <div class="input-box">
                <label>Contact Number</label>
                <input type="tel" placeholder="Enter Contact Number" required>
            </div>

            <div class="input-box">
                <label>Urgency Level</label>

                <select required>
                    <option>Select Urgency</option>
                    <option>Normal</option>
                    <option>Urgent</option>
                    <option>Critical</option>
                </select>

            </div>

            <div class="input-box">
                <label>Additional Message</label>

                <textarea rows="5"
                placeholder="Enter additional information"></textarea>

            </div>

            <button type="submit">
                <i class="fa-solid fa-heart"></i>
                Submit Request
            </button>

        </form>

    </div>

</section>

</body>
